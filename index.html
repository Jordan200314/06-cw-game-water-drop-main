<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Drop Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="game-wrapper">
    <h1 class="game-title">Water Drop</h1>
    <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>

    <div class="score-panel">
      <div class="score">Score: <span id="score">0</span></div>
      <div class="timer">Time: <span id="time">30</span>s</div>

      <label for="difficulty" class="difficulty-label">Difficulty:</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
      </select>

      <button id="start-btn">Start Game</button>
      <button id="reset-btn">Reset</button>
    </div>

    <p id="feedback-message"></p>
    <p id="milestone-message"></p>
    <p id="end-message"></p>

    <div id="game-container"></div>

    <footer class="game-footer">
      <p>Learn more about charity: water and support the mission:</p>
      <div class="footer-links">
        <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer">
          Official Website
        </a>
        <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer">
          Donate
        </a>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
